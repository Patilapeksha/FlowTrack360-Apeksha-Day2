<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#28c7b7;
}

.container{
    width:350px;
}

.header{
    background:#16a085;
    color:white;
    text-align:center;
    padding:20px;
    font-size:28px;
}

.form-box{
    background:white;
    padding:20px;
}

.input-group{
    display:flex;
    margin-bottom:12px;
}

.icon{
    width:40px;
    background:#16a085;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ddd;
}

/* ✅ FIXED RIGHT ALIGNMENT */
.forgot{
    width:100%;
    display:flex;
    justify-content:flex-end;
    margin-top:-5px;
    margin-bottom:10px;
}

.forgot a{
    color:#16a085;
    font-size:13px;
    text-decoration:none;
}

button{
    width:100%;
    padding:12px;
    background:#16a085;
    color:white;
    border:none;
    margin-top:10px;
    cursor:pointer;
}

.switch{
    text-align:center;
    margin-top:10px;
    color:blue;
    cursor:pointer;
}

.switch a{
    color:#16a085;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">Login System</div>

    <div class="form-box">

        <!-- LOGIN -->
        <div id="loginBox">

            <div class="input-group">
                <div class="icon">👤</div>
                <input type="text" id="loginUser" placeholder="Username">
            </div>

            <div class="input-group">
                <div class="icon">🔒</div>
                <input type="password" id="loginPass" placeholder="Password">
            </div>

            <!-- ✅ RIGHT ALIGNED FORGOT PASSWORD -->
            <div class="forgot">
                <a href="#" onclick="alert('Password reset feature coming soon')">
                    Forgot Password?
                </a>
            </div>

            <button onclick="login()">Login</button>

            <div class="switch">
                Don't have an account?
                <a onclick="showSignup()">Signup</a>
            </div>

        </div>

        <!-- SIGNUP -->
        <div id="signupBox" style="display:none;">

            <div class="input-group">
                <div class="icon">👤</div>
                <input type="text" id="suUser" placeholder="Create Username">
            </div>

            <div class="input-group">
                <div class="icon">🔒</div>
                <input type="password" id="suPass" placeholder="Create Password">
            </div>

            <button onclick="signup()">Signup</button>

            <div class="switch">
                Already have an account?
                <a onclick="showLogin()">Login</a>
            </div>

        </div>

    </div>

</div>

<script>

// switch pages
function showSignup(){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("signupBox").style.display="block";
}

function showLogin(){
    document.getElementById("signupBox").style.display="none";
    document.getElementById("loginBox").style.display="block";
}

// SIGNUP
function signup(){
    let user=document.getElementById("suUser").value;
    let pass=document.getElementById("suPass").value;

    if(user==="" || pass===""){
        alert("Please fill all fields");
        return;
    }

    localStorage.setItem("user",user);
    localStorage.setItem("pass",pass);

    alert("Account Created Successfully!");
    showLogin();
}

// LOGIN
function login(){
    let user=document.getElementById("loginUser").value;
    let pass=document.getElementById("loginPass").value;

    let savedUser=localStorage.getItem("user");
    let savedPass=localStorage.getItem("pass");

    if(user==="" || pass===""){
        alert("Please fill all fields");
        return;
    }

    if(user===savedUser && pass===savedPass){
        alert("Login Successful!");
        window.location.href="employee.html";
    } else {
        alert("Invalid credentials");
    }
}

</script>

</body>
</html>
