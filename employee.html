<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Details</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
    padding:10px;
    overflow:hidden;
}

/* MAIN CARD */
.container{
    width:100%;
    max-width:900px;
    height:95vh;
    background:#fff;
    border-radius:16px;
    padding:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 12px 35px rgba(0,0,0,0.25);
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:10px;
}

.header h1{
    font-size:22px;
    color:#0f172a;
}

.header p{
    font-size:12px;
    color:#64748b;
}

/* FORM LAYOUT */
form{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

/* FULL WIDTH FIELD */
.full{
    grid-column:1 / span 2;
}

/* FIELD GROUP */
.field{
    display:flex;
    flex-direction:column;
}

/* LABEL */
label{
    font-size:12px;
    font-weight:600;
    margin-bottom:4px;
    color:#334155;
}

/* INPUTS */
input, select, textarea{
    width:100%;
    padding:9px;
    border:1px solid #d1d5db;
    border-radius:7px;
    font-size:12px;
    outline:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#06b6d4;
    box-shadow:0 0 5px rgba(6,182,212,0.3);
}

textarea{
    height:55px;
    resize:none;
}

/* BUTTONS */
.button-group{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:10px;
}

.btn{
    padding:9px 16px;
    border:none;
    border-radius:7px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
}

.clear-btn{
    background:#e2e8f0;
    color:#334155;
}

.save-btn{
    background:#06b6d4;
    color:white;
}

.save-btn:hover{
    background:#0891b2;
}

/* MOBILE */
@media(max-width:768px){
    body{
        overflow:auto;
        height:auto;
    }

    .container{
        height:auto;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:auto;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Employee Details</h1>
        <p>Fill all information correctly</p>
    </div>

    <form id="employeeForm">

        <div class="form-grid">

            <div class="field">
                <label>Name</label>
                <input type="text" id="name">
            </div>

            <div class="field">
                <label>Employee ID</label>
                <input type="text" id="empid">
            </div>

            <div class="field">
                <label>Position</label>
                <input type="text" id="position">
            </div>

            <div class="field">
                <label>Department</label>
                <input type="text" id="department">
            </div>

            <div class="field">
                <label>Gender</label>
                <select id="gender">
                    <option>Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="field">
                <label>Age</label>
                <input type="number" id="age">
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="field">
                <label>Phone Number</label>
                <input type="text" id="phone">
            </div>

            <div class="field">
                <label>Date Joined</label>
                <input type="date" id="date">
            </div>

            <div class="field full">
                <label>Address</label>
                <textarea id="address"></textarea>
            </div>

        </div>

        <div class="button-group">
            <button type="reset" class="btn clear-btn">Clear</button>
            <button type="submit" class="btn save-btn">Save Employee</button>
        </div>

    </form>

</div>

<script>
document.getElementById("employeeForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Employee details saved successfully!");
});
</script>

</body>
</html>
